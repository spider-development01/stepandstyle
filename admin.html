<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEP. | Operations Command</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- CORE VARS & FALLBACK STYLES --- */
        :root {
            --black: #1a1a1a;
            --bg: #ffffff;
            --accent: #d4ff00;
            --purple: #d1b3ff;
            --border: 3px solid var(--black);
            --radius: 12px;
            --shadow: 6px 6px 0px var(--black);
            --shadow-hover: 8px 8px 0px var(--black);
        }
        * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        
        body { background: #f0f0f0; padding: 20px; padding-bottom: 100px; margin: 0; }
        .container { margin: 0 auto; width: 100%; }
        .bento-card { background: var(--bg); padding: 30px; border: var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 30px; }
        
        /* Typography & Forms */
        h1, h2, h3 { margin: 0; font-weight: 900; text-transform: uppercase; line-height: 1.1; margin-bottom: 20px; }
        label { font-weight: 800; display: block; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: var(--border); border-radius: 8px; font-size: 14px; background: #fafafa; transition: 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: white; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-main { background: var(--black); color: white; padding: 15px 30px; font-weight: 800; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 4px 4px 0px var(--accent); }
        .btn-main:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--accent); }
        .btn-main:active { transform: translate(2px, 2px); box-shadow: none; }
        
        .btn-action { background: white; color: var(--black); border: 2px solid var(--black); box-shadow: 4px 4px 0px var(--black); padding: 8px 16px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 12px; }
        .btn-action:hover { background: var(--black); color: white; transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--accent); }

        .btn-danger { background: #ff4742; color: white; border: 2px solid var(--black); box-shadow: 4px 4px 0px var(--black); padding: 10px 20px; border-radius: 100px; font-weight: 800; cursor: pointer; transition: 0.2s; text-decoration: none; display: inline-block; font-size: 12px; }
        .btn-danger:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--black); }
        .btn-danger:active { transform: translate(2px, 2px); box-shadow: none; }

        /* Tabs & Tables */
        .admin-nav { display: flex; gap: 15px; margin-bottom: 30px; }
        .admin-tab { flex: 1; padding: 20px; text-align: center; border: var(--border); border-radius: 12px; font-weight: 800; cursor: pointer; background: white; transition: 0.2s; box-shadow: var(--shadow); text-transform: uppercase; }
        .admin-tab:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
        .admin-tab.active { background: var(--black); color: white; box-shadow: 4px 4px 0px var(--accent); transform: translate(-2px, -2px); }
        
        .tab-content { display: none; animation: pageFadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes pageFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .admin-table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
        .admin-table th, .admin-table td { padding: 15px; border-bottom: 2px solid var(--black); vertical-align: middle; }
        .admin-table th { background: var(--black); color: white; font-weight: 800; }
        .admin-table tbody tr:hover { background: rgba(0,0,0,0.03); }

        /* Specific Elements */
        .file-drop-area { border: 3px dashed var(--black); border-radius: 12px; padding: 30px; text-align: center; background: #fafafa; cursor: pointer; transition: 0.2s; margin-bottom: 15px; display: block; }
        .file-drop-area:hover { background: #f0f0f0; border-color: var(--accent); }
        .file-drop-area input[type="file"] { display: none; }

        input[type="color"] { -webkit-appearance: none; border: none; width: 55px; height: 55px; border-radius: 12px; cursor: pointer; padding: 0; box-shadow: 4px 4px 0px var(--black); background: none; outline: none; transition: 0.2s; }
        input[type="color"]:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--black); }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 3px solid var(--black); border-radius: 12px; }

        /* Edit Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg); width: 90%; max-width: 750px; max-height: 90vh; overflow-y: auto; border: var(--border); border-radius: var(--radius); padding: 40px; box-shadow: 12px 12px 0px rgba(0,0,0,0.5); position: relative; transform: translateY(30px); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 40px; font-weight: 300; cursor: pointer; background: none; border: none; line-height: 1; color: var(--black); }
        .close-modal:hover { color: var(--accent); }
    </style>
</head>
<body>
    
    <div id="gate" class="container" style="max-width: 500px; text-align: center; margin-top: 15vh;">
        <div class="bento-card">
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">RESTRICTED ZONE</h1>
            <input type="password" id="pass" placeholder="Enter Admin Password">
            <button class="btn-main" onclick="login()" style="width: 100%;">AUTHORIZE</button>
        </div>
    </div>

    <div id="panel" class="container" style="display: none; max-width: 1600px; margin: 30px auto;">
        <h1 style="font-size: 3rem; margin-bottom: 20px;">COMMAND CENTER</h1>
        
        <div class="admin-nav">
            <div class="admin-tab active" onclick="switchTab(event, 'inventory')">INVENTORY</div>
            <div class="admin-tab" onclick="switchTab(event, 'orders')">CUSTOMER ORDERS</div>
        </div>

        <div id="tab-inventory" class="tab-content active">
            <!-- Forms for adding/importing products -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; margin-bottom: 30px;">
                <div class="bento-card">
                    <h2>MINT NEW PRODUCT</h2>
                    <form id="add-form" onsubmit="addOrUpdateProd(event)">
                        <label>Shoe Name</label><input type="text" id="p-name" required>
                        <div style="display: flex; gap: 15px;">
                            <div style="flex: 1;"><label>Price (₹)</label><input type="number" id="p-price" required></div>
                            <div style="flex: 1;"><label>Initial Stock</label><input type="number" id="p-stock" value="10" required></div>
                        </div>
                        <label>Category</label><select id="p-cat"><option value="men">Mens</option><option value="women">Womens</option><option value="kids">Kids</option></select>
                        <label>Image Variants (Color: url | Color2: url)</label>
                        <textarea id="p-variants" rows="3" placeholder="Black: https://url1, https://url2 | Red: https://url3"></textarea>
                        <label>Sizes (Comma separated)</label><input type="text" id="p-sizes" required>
                        <label>Colors</label>
                        <div style="display: flex; gap: 10px; align-items: stretch; margin-bottom: 20px;">
                            <input type="text" id="p-colors" required style="margin-bottom: 0; flex: 1;">
                            <input type="color" onchange="appendColorCode('p-colors', this.value)">
                        </div>
                        <button type="submit" class="btn-main" style="width:100%; margin-top:10px;">INJECT TO DATABASE</button>
                    </form>
                </div>
                
                <!-- CSV Box -->
                <div class="bento-card" style="background: var(--purple);">
                    <h2>BULK IMPORT (CSV)</h2>
                    <p style="font-size: 14px; font-weight: 600; margin-top: 15px;">Required headers: <b>Model No</b>, <b>Sizes Available</b>, <b>Color</b>, <b>Image URLs (Pipe Separated)</b>.</p>
                    <label class="file-drop-area" id="drop-area">
                        <span id="file-name" style="font-weight: 800;">Click to Select CSV File</span><input type="file" id="csv-file" accept=".csv" onchange="updateFileName()">
                    </label>
                    <button class="btn-main" onclick="processCSV()" style="width: 100%; background: white; color: black;" id="csv-btn">UPLOAD & PROCESS</button>
                    <p id="csv-status" style="margin-top: 15px; font-weight: 800; text-align: center;"></p>
                </div>
            </div>

            <!-- Inventory Table -->
            <div class="bento-card" style="overflow-x: auto;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                    <h2>LIVE INVENTORY</h2>
                    <div style="display: flex; gap: 15px;">
                        <button class="btn-action" onclick="exportCSV()">📄 EXPORT</button>
                        <button class="btn-danger" onclick="deleteAllProducts()">☢️ NUKE</button>
                    </div>
                </div>
                <table class="admin-table">
                    <thead><tr><th>IMG</th><th>NAME</th><th>PRICE</th><th>STOCK</th><th>ACTIONS</th></tr></thead>
                    <tbody id="inventory-tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-orders" class="tab-content">
            <!-- FIXED: Added Order Table Layout -->
            <div class="bento-card" style="overflow-x: auto;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                    <h2>CUSTOMER ORDERS</h2>
                    <button class="btn-action" onclick="fetchAdminOrders()">🔄 REFRESH</button>
                </div>
                <table class="admin-table">
                    <thead><tr><th>ORDER ID</th><th>CUSTOMER</th><th>PRODUCT</th><th>DETAILS</th><th>STATUS</th><th>ACTIONS</th></tr></thead>
                    <tbody id="admin-orders-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- FULL EDIT MODAL -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeEditModal()">&times;</button>
            <h2 style="font-size: 2.5rem; margin-bottom: 25px;">EDIT PRODUCT</h2>
            <form id="edit-form" onsubmit="addOrUpdateProd(event, true)">
                <input type="hidden" id="e-id">
                <label>Shoe Name</label><input type="text" id="e-name" required>
                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;"><label>Price (₹)</label><input type="number" id="e-price" required></div>
                    <div style="flex: 1;"><label>Stock</label><input type="number" id="e-stock" required></div>
                </div>
                <label>Category</label><select id="e-cat"><option value="men">Mens</option><option value="women">Womens</option><option value="kids">Kids</option></select>
                <label>Image Variants</label><textarea id="e-variants" rows="4"></textarea>
                <label>Sizes</label><input type="text" id="e-sizes" required>
                <label>Colors</label>
                <div style="display: flex; gap: 10px; align-items: stretch; margin-bottom: 20px;">
                    <input type="text" id="e-colors" required style="margin-bottom: 0; flex: 1;">
                    <input type="color" onchange="appendColorCode('e-colors', this.value)">
                </div>
                <button type="submit" class="btn-main" id="save-edit-btn" style="width:100%; margin-top:10px;">SAVE CHANGES</button>
            </form>
        </div>
    </div>

    <script>
        const SB_URL = "https://jjfjqanesiqgktocjaez.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqZmpxYW5lc2lxZ2t0b2NqYWV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTgyNTcsImV4cCI6MjA4OTA3NDI1N30.ZJxC1H8r1oj8WGR3wJb7hf3-26P_BT8B5avcyZujftg";
        let globalInventory =[]; 
        let dbSchema = null;

        // --- 1. BULLETPROOF API ENGINE ---
        async function api(path, method = 'GET', data = null) {
            try {
                const headers = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };
                if (method !== 'GET') headers['Prefer'] = 'return=representation'; 
                const options = { method, headers, cache: 'no-store' };
                if (data) options.body = JSON.stringify(data);
                
                const response = await fetch(`${SB_URL}/rest/v1/${path}`, options);
                const responseText = await response.text();
                
                if (!response.ok) {
                    let errMessage = responseText;
                    try { const errObj = JSON.parse(responseText); errMessage = errObj.message || errObj.details; } catch(e){}
                    alert(`⚠️ DATABASE ERROR:\n${errMessage}`);
                    return null;
                }
                const jsonResult = responseText ? JSON.parse(responseText) :[];
                return jsonResult;
            } catch (err) { alert("Network Error: Could not reach Supabase."); return null; }
        }

        // --- 2. AUTH & UI HELPERS ---
        async function login() {
            if (document.getElementById('pass').value === 'step%c0unt') {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                await fetchAdminInventory(); 
            } else { alert('Access Denied'); }
        }

        function switchTab(event, tabName) { 
            document.querySelectorAll('.admin-tab,.tab-content').forEach(el=>el.classList.remove('active')); 
            event.currentTarget.classList.add('active'); 
            document.getElementById(`tab-${tabName}`).classList.add('active'); 
            if(tabName === 'orders') fetchAdminOrders(); // Auto load orders
        }

        function appendColorCode(inputId, hex) { 
            const i = document.getElementById(inputId); 
            let v = i.value.split(',').map(c=>c.trim()).filter(Boolean); 
            hex = hex.toUpperCase(); 
            if(!v.includes(hex)){ v.push(hex); i.value = v.join(', ') }; 
        }

        // --- 3. FIX: BULLETPROOF URL PARSER ---
        // Prevents the "Default: https" bug by smartly splitting ONLY on variant colors, not on URLs
        function parseVariantsText(text, fallbackColor = 'Default') {
            const color_variants = {};
            const image_urls =[];
            if (!text) return { color_variants, image_urls };

            text.split('|').forEach(part => {
                const colonIdx = part.indexOf(':');
                let colorStr = fallbackColor;
                let urlsStr = part;

                if (colonIdx !== -1) {
                    const potentialColor = part.substring(0, colonIdx).trim();
                    // Ensure the colon isn't just part of "https://" or "http://"
                    if (potentialColor.toLowerCase() !== 'http' && potentialColor.toLowerCase() !== 'https') {
                        colorStr = potentialColor || fallbackColor;
                        urlsStr = part.substring(colonIdx + 1).trim();
                    }
                }

                const arr = urlsStr.split(',').map(u => u.trim()).filter(Boolean);
                if (arr.length > 0) {
                    color_variants[colorStr] = (color_variants[colorStr] ||[]).concat(arr);
                    image_urls.push(...arr);
                }
            });

            return { color_variants, image_urls };
        }

        function buildPayload(formPrefix) {
            const payload = {
                name: document.getElementById(`${formPrefix}-name`).value.trim(),
                price: Number(document.getElementById(`${formPrefix}-price`).value) || 0,
                category: document.getElementById(`${formPrefix}-cat`).value,
                sizes: document.getElementById(`${formPrefix}-sizes`).value.split(',').map(s=>s.trim()).filter(Boolean),
                colors: document.getElementById(`${formPrefix}-colors`).value.split(',').map(s=>s.trim()).filter(Boolean),
            };

            if (dbSchema && dbSchema.includes('stock')) {
                payload.stock = Number(document.getElementById(`${formPrefix}-stock`).value) || 0;
            }
            
            const variantsText = document.getElementById(`${formPrefix}-variants`).value;
            const fallbackColor = payload.colors.length > 0 ? payload.colors[0] : 'Default';
            const parsedUrls = parseVariantsText(variantsText, fallbackColor);

            if (dbSchema && dbSchema.includes('color_variants')) {
                payload.color_variants = parsedUrls.color_variants;
            }
            if (dbSchema && dbSchema.includes('image_urls') && !dbSchema.includes('color_variants')) {
                payload.image_urls = parsedUrls.image_urls;
            } else if (!dbSchema) {
                // Fallback safe assignment
                payload.color_variants = parsedUrls.color_variants;
                payload.image_urls = parsedUrls.image_urls;
            }
            
            return payload;
        }

        // --- 4. INVENTORY MANAGEMENT ---
        async function fetchAdminInventory() {
            const data = await api('products?order=id.desc');
            if (data === null) return;
            globalInventory = data; 

            if (globalInventory.length > 0) {
                dbSchema = Object.keys(globalInventory[0]);
            } else {
                dbSchema =['name', 'price', 'category', 'sizes', 'colors', 'stock', 'color_variants'];
            }
            
            document.getElementById('inventory-tbody').innerHTML = globalInventory.map(p => {
                let img = 'https://via.placeholder.com/100';
                if (p.color_variants && Object.keys(p.color_variants).length > 0) {
                    const firstColor = Object.keys(p.color_variants)[0];
                    if (p.color_variants[firstColor].length > 0) img = p.color_variants[firstColor][0];
                } else if (p.image_urls && p.image_urls.length > 0) {
                    img = p.image_urls[0];
                }

                return `<tr>
                    <td><img src="${img}" width="60" style="border:3px solid black; border-radius:8px; aspect-ratio: 1/1; object-fit: cover; background: white;"></td>
                    <td><b>${p.name || 'N/A'}</b></td>
                    <td>₹${Number(p.price || 0).toLocaleString('en-IN')}</td>
                    <td>${p.stock !== undefined ? p.stock : 'N/A'}</td>
                    <td><div style="display: flex; gap: 10px;"><button onclick="openEditModal(${p.id})">EDIT</button><button onclick="delProd(${p.id})">DELETE</button></div></td>
                </tr>`.replaceAll('<button', '<button class="btn-action"');
            }).join('');
        }

        async function addOrUpdateProd(event, isEdit = false) {
            event.preventDefault();
            const btn = event.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'SAVING...'; btn.disabled = true;

            const formPrefix = isEdit ? 'e' : 'p';
            const payload = buildPayload(formPrefix);
            let result;

            if (isEdit) {
                const id = document.getElementById('e-id').value;
                result = await api(`products?id=eq.${id}`, 'PATCH', payload);
            } else {
                result = await api('products', 'POST', payload);
            }

            btn.innerText = originalText;
            btn.disabled = false;
            
            if (result !== null) {
                if(isEdit) closeEditModal();
                else document.getElementById('add-form').reset();
                fetchAdminInventory();
            }
        }
        
        async function delProd(id) { if (confirm(`Delete product #${id}?`)) { await api(`products?id=eq.${id}`, 'DELETE'); fetchAdminInventory(); } }

        // --- 5. EDIT MODAL LOGIC (FIXED RENDERING) ---
        function openEditModal(id) {
            const p = globalInventory.find(item => item.id === id);
            if (!p) return;
            
            document.getElementById('e-id').value = p.id;
            document.getElementById('e-name').value = p.name || '';
            document.getElementById('e-price').value = p.price || 0;
            document.getElementById('e-stock').value = p.stock || 10;
            document.getElementById('e-cat').value = p.category || 'men';
            document.getElementById('e-sizes').value = Array.isArray(p.sizes) ? p.sizes.join(', ') : '';
            document.getElementById('e-colors').value = Array.isArray(p.colors) ? p.colors.join(', ') : '';
            
            let variantStr = '';
            if (p.color_variants && typeof p.color_variants === 'object' && Object.keys(p.color_variants).length > 0) {
                variantStr = Object.entries(p.color_variants).map(([c, urls]) => `${c}: ${urls.join(', ')}`).join(' | ');
            } else if (p.image_urls && Array.isArray(p.image_urls) && p.image_urls.length > 0) {
                variantStr = p.image_urls.join(', '); // Clean direct join, without forcing "Default:" string
            }
            document.getElementById('e-variants').value = variantStr;

            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }
        
        // --- 6. EXPORT / IMPORT CSV ---
        function exportCSV() {
            if (!globalInventory || globalInventory.length === 0) return alert("Inventory is empty.");
            const headers =['ID', 'Model No', 'Price', 'Stock', 'Category', 'Sizes Available', 'Color', 'Image URLs (Pipe Separated)'];
            const csvRows = globalInventory.map(p => {
                const name = `"${(p.name || '').replace(/"/g, '""')}"`;
                const price = p.price || 0; const stock = p.stock || 0; const cat = p.category || 'men';
                const sizes = `"${(p.sizes ||[]).join(', ')}"`; const colors = `"${(p.colors ||[]).join(', ')}"`;
                
                let variantStr = '';
                if (p.color_variants && typeof p.color_variants === 'object') variantStr = Object.entries(p.color_variants).map(([c, urls]) => `${c}: ${urls.join(', ')}`).join(' | ');
                else if (p.image_urls && p.image_urls.length > 0) variantStr = p.image_urls.join(', ');
                const images = `"${variantStr.replace(/"/g, '""')}"`;
                
                return[p.id, name, price, stock, cat, sizes, colors, images].join(',');
            });
            const blob = new Blob([[headers.join(','), ...csvRows].join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `STEP_INVENTORY_${Date.now()}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        async function deleteAllProducts() {
            if (globalInventory.length === 0) return alert("Inventory is already empty.");
            if (!confirm("☢️ CRITICAL WARNING: You are about to permanently delete ALL products. Proceed?")) return;
            if (prompt("Type 'NUKE' below:") === 'NUKE') {
                await api('products?id=gte.0', 'DELETE');
                alert("Database wiped."); fetchAdminInventory();
            } else { alert("Aborted."); }
        }

        function updateFileName() { document.getElementById('file-name').innerText = document.getElementById('csv-file').files[0] ? document.getElementById('csv-file').files[0].name : 'Click to Select CSV File'; }
        
        async function processCSV() {
            const fileInput = document.getElementById('csv-file'), status = document.getElementById('csv-status'), btn = document.getElementById('csv-btn');
            if (!fileInput.files.length) { status.innerText = "Error: Select a file."; status.style.color = "red"; return; }

            const reader = new FileReader();
            reader.onload = async function(e) {
                btn.innerText = "PROCESSING..."; btn.disabled = true; status.innerText = "Parsing..."; status.style.color = "var(--black)";
                
                const rows = parseCSVText(e.target.result);
                if (rows.length < 2) { status.innerText = "Error: Invalid CSV."; status.style.color = "red"; btn.innerText = "UPLOAD & PROCESS"; btn.disabled = false; return; }

                const headers = rows[0].map(h => h.toLowerCase().trim());
                const colMap = {
                    name: headers.findIndex(h => h.includes('model') || h.includes('name')), sizes: headers.findIndex(h => h.includes('size')),
                    colors: headers.findIndex(h => h.includes('color')), images: headers.findIndex(h => h.includes('image') || h.includes('url')),
                    price: headers.findIndex(h => h.includes('price')), stock: headers.findIndex(h => h.includes('stock'))
                };

                if (colMap.name === -1 || colMap.images === -1) { status.innerText = "Error: Missing columns."; status.style.color = "red"; btn.innerText = "UPLOAD & PROCESS"; btn.disabled = false; return; }

                const payloads =[];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row.length < 2 || !row[colMap.name]) continue;

                    const payload = {
                        name: row[colMap.name].trim(),
                        price: colMap.price > -1 ? (parseFloat(row[colMap.price]) || 9999) : 9999,
                        stock: colMap.stock > -1 ? (parseInt(row[colMap.stock]) || 10) : 10,
                        category: 'men',
                        sizes: colMap.sizes > -1 ? row[colMap.sizes].split(',').map(s => s.trim()).filter(Boolean) :[],
                        colors: colMap.colors > -1 ? row[colMap.colors].split(',').map(c => c.trim()).filter(Boolean) : ['Default']
                    };

                    const imgsRaw = row[colMap.images] || '';
                    const fallbackColor = payload.colors.length > 0 ? payload.colors[0] : 'Default';
                    const parsed = parseVariantsText(imgsRaw, fallbackColor); // Uses our fixed parser!

                    payload.color_variants = parsed.color_variants;
                    payload.image_urls = parsed.image_urls;
                    payloads.push(payload);
                }

                const res = await api('products', 'POST', payloads);
                if(res !== null) {
                    status.innerText = `SUCCESS: ${payloads.length} products injected!`; status.style.color = "green";
                    fileInput.value = ""; document.getElementById('file-name').innerText = 'Click to Select CSV File'; fetchAdminInventory();
                } else { status.innerText = "Error: Injection failed."; status.style.color = "red"; }
                btn.innerText = "UPLOAD & PROCESS DATABANK"; btn.disabled = false;
            };
            reader.readAsText(fileInput.files[0]);
        }

        function parseCSVText(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0;
            for (let l of text) {
                if ('"' === l) { if (s && l === p) row[i] += l; s = !s; }
                else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) { if ('\r' === p) row[i] = row[i].slice(0, -1); row = ret[++r] = [l = '']; i = 0; }
                else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.length > 1 || (r.length === 1 && r[0] !== ''));
        }

        // --- 7. ORDER MANAGEMENT ---
        async function fetchAdminOrders() {
            const orders = await api('orders?select=*,products(name)&order=created_at.desc');
            const tbody = document.getElementById('admin-orders-tbody');
            if (!tbody || !orders) return;
            
            tbody.innerHTML = orders.map(o => `<tr>
                <td><b>#${o.id}</b><br><span style="font-size:10px; color:#666;">${new Date(o.created_at).toLocaleDateString()}</span></td>
                <td><b>${o.customer_name}</b><br><a href="mailto:${o.customer_email}">${o.customer_email}</a></td>
                <td><b>${o.products ? o.products.name : 'Product Deleted'}</b></td>
                <td>Size: ${o.size_selected}<br>Color: ${o.color_selected}</td>
                <td>
                    <select id="status-${o.id}" style="padding:10px; border: 2px solid var(--black); border-radius: 6px; font-weight:800; outline:none; cursor: pointer; margin-bottom: 0;">
                        <option value="Ordered" ${o.status === 'Ordered' ? 'selected' : ''}>Ordered</option>
                        <option value="Shipped" ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
                        <option value="Delivered" ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                    </select>
                </td>
                <td><button onclick="updateOrderStatus(${o.id})" class="btn-action">UPDATE</button></td>
            </tr>`).join('');
        }

        async function updateOrderStatus(orderId) {
            const newStatus = document.getElementById(`status-${orderId}`).value;
            const res = await api(`orders?id=eq.${orderId}`, 'PATCH', { status: newStatus });
            if (res !== null) { alert(`Order #${orderId} marked as ${newStatus}.`); fetchAdminOrders(); }
        }
    </script>
</body>
