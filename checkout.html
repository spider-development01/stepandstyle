<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S&S. | Secure Checkout</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-bento { display: grid; grid-template-columns: 1fr; gap: 30px; margin-top: 20px; align-items: start; }
        .right-column { display: flex; flex-direction: column; gap: 30px; }
        @media (min-width: 900px) {
            .checkout-bento { grid-template-columns: 1.2fr 1fr; }
            .bento-gallery { position: sticky; top: 100px; height: auto; }
        }
        .gallery-container { display: flex; flex-direction: column; gap: 20px; height: 100%; }
        .main-image { width: 100%; aspect-ratio: 4/5; object-fit: cover; border: var(--border); border-radius: var(--radius); background: #eee; box-shadow: var(--shadow); }
        .thumbnails { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .thumb-img { width: 80px; height: 80px; flex-shrink: 0; object-fit: cover; border: 3px solid transparent; border-radius: 12px; cursor: pointer; opacity: 0.6; transition: 0.2s; background: #eee; }
        .thumb-img:hover, .thumb-img.active { opacity: 1; border-color: var(--black); box-shadow: 4px 4px 0px var(--black); transform: translateY(-2px); }
        .thumbnails::-webkit-scrollbar { height: 6px; }
        .thumbnails::-webkit-scrollbar-thumb { background: var(--black); border-radius: 10px; }
        @keyframes smoothFadeIn { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        .smooth-fade { animation: smoothFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body onload="loadCheckout()">

    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-header"><div class="logo">S&S.</div><div class="close-btn" id="closeBtn">&times;</div></div>
        <div class="menu-content">
            <ul class="mobile-links"><li style="--i:1"><a href="mens.html">MENS</a></li><li style="--i:2"><a href="womens.html">WOMENS</a></li><li style="--i:3"><a href="kids.html">KIDS</a></li><li style="--i:4"><a href="contact.html">CONTACT</a></li></ul>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" id="menuBtn"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg><span>SHOP</span></div>
        <a href="account.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>PROFILE</span></a>
        <a href="index.html" class="dock-logo">S&S.</a>
        <a href="orders.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 8v13H3V8"></path><path d="M1 3h22v5H1z"></path><path d="M10 12h4"></path></svg><span>ORDERS</span></a>
        <a href="cart.html" class="nav-item"><div class="cart-badge cart-count">0</div><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><span>CART</span></a>
    </div>

    <div class="container checkout-bento">
        <div class="bento-card bento-gallery" id="gallery-ui" style="background: white; padding: 25px;"></div>

        <div class="right-column">
            <div class="bento-card bento-info" id="info-ui" style="background: var(--purple);"></div>
            
            <form id="checkout-form" onsubmit="placeOrder(event)" style="display: contents;">
                <div class="bento-card bento-form" id="checkout-form-container" style="display: none; background: var(--secondary);">
                    <h2>SECURE CHECKOUT</h2>
                    <p style="margin-bottom: 20px; font-weight: 600;">Where are we dropping this?</p>
                    
                    <label>Full Name</label><input type="text" id="c-name" placeholder="John Doe" required>
                    <label>Email Address</label><input type="email" id="c-email" placeholder="john@example.com" required>
                    <label>Phone Number</label><input type="tel" id="c-phone" placeholder="+91" required>
                    <label>Delivery Address</label><textarea id="c-address" rows="3" placeholder="123 Street, City, State, PIN" required></textarea>
                    
                    <button type="submit" class="btn-main" style="width: 100%; font-size: 1.2rem; padding: 25px; margin-top: 10px;">CONFIRM & PAY</button>
                </div>
            </form>

            <!-- NEW: LOGIN PROMPT FOR GUEST USERS -->
            <div class="bento-card" id="login-prompt-container" style="display: none; background: var(--secondary); text-align: center;">
                <h2>LOGIN REQUIRED</h2>
                <p style="margin: 10px 0 25px 0; font-weight: 600;">Please login or create an account to continue with your purchase.</p>
                <a href="account.html" class="btn-main" style="display: block; padding: 25px;">LOGIN / SIGN UP</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentShoe = null;
        let productVariants = {};

        async function loadCheckout() {
            setupGlobal();
            const id = new URLSearchParams(window.location.search).get('id');
            const galleryUi = document.getElementById('gallery-ui');
            const infoUi = document.getElementById('info-ui');

            if(!id) { galleryUi.innerHTML = `<h2 style="padding: 40px; text-align: center;">NO PRODUCT SELECTED</h2>`; return; }

            // INJECT SKELETONS
            galleryUi.innerHTML = `<div class="gallery-container skeleton-card-wrapper" style="border:none; box-shadow:none;"><div class="skeleton-box" style="width: 100%; aspect-ratio: 4/5; border-radius: var(--radius);"></div><div class="thumbnails"><div class="skeleton-box" style="width: 80px; height: 80px; border-radius: 12px; flex-shrink: 0;"></div><div class="skeleton-box" style="width: 80px; height: 80px; border-radius: 12px; flex-shrink: 0;"></div><div class="skeleton-box" style="width: 80px; height: 80px; border-radius: 12px; flex-shrink: 0;"></div></div></div>`;
            infoUi.innerHTML = `<div class="skeleton-card-wrapper" style="border:none; box-shadow:none; background:transparent;"><div class="skeleton-box" style="height: 48px; width: 80%; border-radius: 8px; margin-bottom: 15px;"></div><div class="skeleton-box" style="height: 32px; width: 40%; border-radius: 8px; margin-bottom: 35px;"></div><div class="skeleton-box" style="height: 14px; width: 30%; border-radius: 4px; margin-bottom: 10px;"></div><div class="swatch-group"><div class="skeleton-box" style="width: 65px; height: 55px; border-radius: 8px;"></div><div class="skeleton-box" style="width: 65px; height: 55px; border-radius: 8px;"></div></div><div style="display: flex; gap: 15px; margin-top: 30px;"><div class="skeleton-box" style="flex: 1; height: 65px; border-radius: 100px;"></div><div class="skeleton-box" style="flex: 1; height: 65px; border-radius: 100px;"></div></div></div>`;

            const data = await api(`products?id=eq.${id}`);
            if(!data || data.length === 0) { galleryUi.innerHTML = `<h2>PRODUCT NOT FOUND</h2>`; infoUi.innerHTML = ''; return; }
            
            currentShoe = data[0];
            productVariants = currentShoe.color_variants || {};
            
            const title = currentShoe.name || 'Unknown Product';
            const styleTxt = currentShoe.style || 'SNEAKERS';
            const sizes = Array.isArray(currentShoe.sizes) ? currentShoe.sizes :[];
            const colors = Array.isArray(currentShoe.colors) ? currentShoe.colors :[];

            const currentPrice = Number(currentShoe.price || 0);
            const originalPrice = currentShoe.compare_at_price ? Number(currentShoe.compare_at_price) : null;
            let priceHtml = `₹${currentPrice.toLocaleString('en-IN')}`;
            let saleBadgeHtml = '';

            if (originalPrice && originalPrice > currentPrice) {
                const percentOff = Math.round(((originalPrice - currentPrice) / originalPrice) * 100);
                priceHtml = `<span style="color: #ff4742;">₹${currentPrice.toLocaleString('en-IN')}</span> <s style="color: #999; font-size: 1.5rem; margin-left: 10px;">₹${originalPrice.toLocaleString('en-IN')}</s>`;
                saleBadgeHtml = `<div style="background:#ff4742; color:white; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:900; border:2px solid var(--black); box-shadow:2px 2px 0px var(--black); display:inline-block; margin-bottom:10px;">SALE ${percentOff}% OFF</div>`;
            }

            try {
                const user = JSON.parse(localStorage.getItem('step_user'));
                if (user) {
                    document.getElementById('c-name').value = user.name || '';
                    document.getElementById('c-email').value = user.email || '';
                }
            } catch(e) {}

            infoUi.innerHTML = `
                <div class="smooth-fade">
                    <input type="hidden" id="order-product-id" value="${currentShoe.id}">
                    <input type="hidden" id="order-final-price" value="${currentPrice}">
                    ${saleBadgeHtml}
                    <div style="font-size:10px; font-weight:900; letter-spacing:1px; margin-bottom:5px; color:#555;">${styleTxt.toUpperCase()}</div>
                    <h1 id="p-title" style="font-size: clamp(2.5rem, 5vw, 3.5rem); line-height: 1;">${title}</h1>
                    <h2 id="p-price" style="font-size: 2.2rem; margin: 15px 0 25px 0;">${priceHtml}</h2>
                    <label>Select Size <span id="selected-size-name" style="color: var(--black); font-weight: 800;"></span></label>
                    <div class="swatch-group" id="size-swatches">
                        ${sizes.map((s, index) => `<div class="size-swatch"><input type="radio" name="size" id="size-${index}" value="${s}" required onchange="document.getElementById('selected-size-name').innerText = '- ' + this.value;"><label for="size-${index}">${s}</label></div>`).join('') || '<p>No sizes available</p>'}
                    </div>
                    <label>Select Color <span id="selected-color-name" style="color: var(--black); font-weight: 800;"></span></label>
                    <div class="swatch-group" id="color-swatches">
                        ${colors.map((c, index) => {
                            const safeValue = c.replace(/"/g, '&quot;');
                            const bgColor = c.replace(/\\s/g, ''); 
                            return `<div class="color-swatch"><input type="radio" name="color" id="color-${index}" value="${safeValue}" required onchange="handleColorChange(this.value)" ${index === 0 ? 'checked' : ''}><label for="color-${index}" style="background-color: ${bgColor};" title="${safeValue}"></label></div>`;
                        }).join('') || '<p>No colors specified</p>'}
                    </div>
                    <div style="display: flex; gap: 15px; margin-top: 30px; flex-wrap: wrap;">
                        <button type="button" class="btn-white" id="add-cart-btn" onclick="handleAddToCart()">ADD TO BAG</button>
                        <button type="button" class="btn-main" id="buy-now-btn" onclick="revealCheckoutForm()">BUY NOW</button>
                    </div>
                </div>`;

            const firstColor = colors.length > 0 ? colors[0] : null;
            if(firstColor) handleColorChange(firstColor); else updateProductGallery(null);
        }

        function handleColorChange(colorVal) { document.getElementById('selected-color-name').innerText = '- ' + colorVal; updateProductGallery(colorVal); }

        function updateProductGallery(color) {
            let images = [];
            if (color && productVariants[color] && productVariants[color].length > 0) { images = productVariants[color]; } 
            else if (currentShoe.image_urls && currentShoe.image_urls.length > 0) { images = currentShoe.image_urls; } 
            else if (typeof currentShoe.image_url === 'string') { images = [currentShoe.image_url]; } 
            else { images = ['https://via.placeholder.com/400']; }

            const gallery = document.getElementById('gallery-ui');
            const mainImg = images[0];
            const thumbnails = images.map((url, idx) => `<img src="${url}" class="thumb-img ${idx === 0 ? 'active' : ''}" onclick="changeImage(this, '${url}')" loading="lazy">`).join('');

            gallery.innerHTML = `<div class="gallery-container smooth-fade"><img src="${mainImg}" class="main-image" id="main-view"><div class="thumbnails">${thumbnails}</div></div>`;
        }
        
        function changeImage(element, url) { document.getElementById('main-view').src = url; document.querySelectorAll('.thumb-img').forEach(img => img.classList.remove('active')); element.classList.add('active'); }

        // --- UPDATED FUNCTION ---
        function revealCheckoutForm() {
            const sizeCheck = document.querySelector('input[name="size"]:checked');
            const colorCheck = document.querySelector('input[name="color"]:checked');
            if(!sizeCheck || (!colorCheck && document.getElementById('color-swatches').innerHTML.includes('radio'))) {
                return alert("Please select your Size and Color before proceeding.");
            }

            // Change button state immediately
            const btn = document.getElementById('buy-now-btn');
            btn.innerHTML = 'SCROLL DOWN ↓';
            btn.classList.remove('btn-main');
            btn.classList.add('btn-white');
            btn.style.pointerEvents = 'none';

            let user = null;
            try { user = JSON.parse(localStorage.getItem('step_user')); } catch (e) { console.error("Could not parse user from localStorage", e); }
            
            if (user) {
                // User is logged in, show the checkout form
                const formBox = document.getElementById('checkout-form-container');
                formBox.style.display = 'block'; 
                formBox.classList.add('smooth-fade'); 
                setTimeout(() => { formBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
            } else {
                // User is NOT logged in, show the login prompt
                const loginPrompt = document.getElementById('login-prompt-container');
                loginPrompt.style.display = 'block';
                loginPrompt.classList.add('smooth-fade');
                setTimeout(() => { loginPrompt.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
            }
        }

        function handleAddToCart() {
            const sizeCheck = document.querySelector('input[name="size"]:checked');
            const colorCheck = document.querySelector('input[name="color"]:checked');
            if(!sizeCheck || (!colorCheck && document.getElementById('color-swatches').innerHTML.includes('radio'))) { return alert("Please select your Size and Color first."); }

            const cart = getCart();
            cart.push({
                id: document.getElementById('order-product-id').value,
                name: document.getElementById('p-title').innerText,
                price: parseInt(document.getElementById('order-final-price').value),
                image: document.getElementById('main-view').src, 
                size: sizeCheck ? sizeCheck.value : 'N/A',
                color: colorCheck ? colorCheck.value : 'N/A'
            });
            saveCart(cart);

            const btn = document.getElementById('add-cart-btn');
            btn.innerHTML = 'ADDED!';
            btn.style.background = 'var(--secondary)'; 
            btn.style.color = 'var(--black)';
            setTimeout(() => { 
                btn.innerHTML = `ADD TO BAG`; 
                btn.style.background = 'white';
                btn.style.color = 'var(--black)';
            }, 1500);
        }

        async function placeOrder(e) {
            e.preventDefault();
            const sizeCheck = document.querySelector('input[name="size"]:checked');
            const colorCheck = document.querySelector('input[name="color"]:checked');

            const orderData = {
                product_id: document.getElementById('order-product-id').value,
                customer_name: document.getElementById('c-name').value,
                customer_email: document.getElementById('c-email').value,
                customer_phone: document.getElementById('c-phone').value,
                address: document.getElementById('c-address').value,
                size_selected: sizeCheck ? sizeCheck.value : 'N/A',
                color_selected: colorCheck ? colorCheck.value : 'N/A'
            };
            
            await api('orders', 'POST', orderData);
            
            document.body.innerHTML = `<div class="container" style="display:flex; justify-content:center; align-items:center; min-height:80vh;"><div class="bento-card smooth-fade" style="text-align:center; background:var(--secondary); width: 100%; max-width: 600px;"><h1 style="font-size:clamp(3rem, 6vw, 5rem);">ORDER SECURED.</h1><p style="font-size: 1.2rem; margin: 20px 0; font-weight: 600;">Your gear is being prepped for dispatch.</p><a href="orders.html" class="btn-main">VIEW ARCHIVE</a></div></div>`;
        }
    </script>
</body>
</html>
