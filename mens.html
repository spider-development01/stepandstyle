<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S&S. | Mens Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="loadProducts('men')">

    <!-- GLOBAL FULLSCREEN MENU OVERLAY -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-header">
            <div class="logo">S&S.</div>
            <div class="close-btn" id="closeBtn">&times;</div>
        </div>
        <div class="menu-content">
            <ul class="mobile-links">
                <li style="--i:1"><a href="mens.html">MENS</a></li>
                <li style="--i:2"><a href="womens.html">WOMENS</a></li>
                <li style="--i:3"><a href="kids.html">KIDS</a></li>
                <li style="--i:4"><a href="cart.html">CART</a></li>
            </ul>
        </div>
    </div>

    <!-- MAIN PAGE CONTENT -->
    <div class="container">
        
        <!-- Hero Banner Card -->
        <div class="bento-card" style="background: var(--secondary); margin-bottom: 40px;">
            <h1 style="font-size: 4rem;">MEN'S DROPS.</h1>
            <p style="font-weight: 600;">Engineered for the streets. Built for movement.</p>
        </div>

        <!-- Upgraded Filter Controls -->
        <div class="filter-container">
            <div class="filter-select">
                <select id="sizeFilter" onchange="loadProducts('men')">
                    <option value="">All Sizes</option>
                    <option value="8">UK 8</option>
                    <option value="9">UK 9</option>
                    <option value="10">UK 10</option>
                    <option value="11">UK 11</option>
                </select>
            </div>
            <div class="filter-select">
                <select id="priceSort" onchange="loadProducts('men')">
                    <option value="">Sort By</option>
                    <option value="low">Price: Low to High</option>
                    <option value="high">Price: High to Low</option>
                </select>
            </div>
        </div>

        <!-- Product Grid (Populated by script.js) -->
        <div class="product-grid" id="main-grid">
            <!-- Skeletons will be injected here instantly, followed by products -->
        </div>
    </div>

    <!-- UNIVERSAL FLOATING APP DOCK -->
    <div class="bottom-nav">
        <!-- Menu Trigger -->
        <div class="nav-item" id="menuBtn">
            <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            <span>SHOP</span>
        </div>
        <!-- Profile -->
        <a href="account.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>PROFILE</span>
        </a>
        <!-- BRAND LOGO (Center Anchor) -->
        <a href="index.html" class="dock-logo">S&S.</a>
        <!-- Orders / Archive -->
        <a href="orders.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 8v13H3V8"></path><path d="M1 3h22v5H1z"></path><path d="M10 12h4"></path></svg>
            <span>ORDERS</span>
        </a>
        <!-- Cart -->
        <a href="cart.html" class="nav-item">
            <div class="cart-badge cart-count">0</div>
            <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span>CART</span>
        </a>
    </div>

    <!-- Core Engine -->
    <script src="script.js"></script>

</body>
</html>
